name: Update Plugins

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 00:00 (UTC) に実行
  push:
    branches:
      - auto-update # テスト用にこのブランチへのpushで起動
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find

      - name: Update plugins
        run: |
          # 既存のロックファイルを削除して、バージョン固定を強制的に解除
          rm -f lazy-lock.json
          # sync で最新のプラグインをインストール
          nvim --headless "+Lazy! sync" +qa
          # update で最新のロックファイルを再生成
          nvim --headless "+Lazy! update" +qa

      - name: Check for changes (Debug)
        run: |
          git status
          git diff lazy-lock.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(plugins): update lazy-lock.json"
          title: "🚀 Plugin Updates"
          body: |
            This PR updates `lazy-lock.json` with the latest plugin versions.
            Generated by GitHub Actions.
          branch: "update-plugins"
          delete-branch: true
