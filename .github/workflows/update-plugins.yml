name: Update Plugins

on:
  schedule:
    - cron: '0 0 * * 0' # 毎週日曜日 00:00 (UTC) に実行 日本時間では日曜日の午前 9:00
  push:
    branches:
      - auto-update # テスト用にこのブランチへのpushでも起動
  workflow_dispatch:      # 手動実行ボタンを有効化

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find

      - name: Update plugins
        run: |
          # Neovim が設定ファイルを見つけられるように ~/.config/nvim へのリンクを作成
          mkdir -p ~/.config
          ln -s $(pwd) ~/.config/nvim

          # 既存のロックファイルを削除して、バージョン固定を強制的に解除
          rm -f lazy-lock.json

          # sync でプラグインをインストール
          nvim --headless "+Lazy! sync" +qa
          # update で最新のロックファイルを再生成
          nvim --headless "+Lazy! update" +qa

      - name: Generate PR Body
        id: pr_body
        run: |
          {
            echo "body<<EOF"
            echo "## 🚀 プラグインのアップデート (自動メンテナンス)"
            echo ""
            echo "プラグインの最新バージョンが確認されたため、\`lazy-lock.json\` を更新しました。"
            echo "以下のプラグインが更新されました："
            echo ""
            # git diff から更新されたプラグイン名を抽出してリスト化
            git diff lazy-lock.json | grep '^+  "' | sed -E 's/^\+  "([^"]+)".*/- **\1**/' | sort | uniq
            echo ""
            echo "---"
            echo "この Pull Request は GitHub Actions によって毎週日曜日に自動生成されます。"
            echo "内容を確認し、問題がなければマージしてください。"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(plugins): update lazy-lock.json"
          title: "🚀 Plugin Updates"
          body: ${{ steps.pr_body.outputs.body }}
          branch: "update-plugins"
          delete-branch: true
